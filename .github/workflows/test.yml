name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}-${{ github.ref == 'refs/heads/main' && github.sha || ''}}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test-export:
    name: Test Export Core Package
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: latest
          frozen: true
          cache: false

      - name: Run Tests
        run: pixi run test-python-core --capture=no

      - name: Run Python Linting
        run: pixi run lint-python

      - name: Check Python Formatting
        run: pixi run format-python-check

  test-controller:
    name: Test Controller Environment
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: latest
          frozen: true
          cache: false

      - name: Build Controller
        run: pixi run build-cpp

      - name: Run Controller Tests
        run: pixi run test-cpp

      - name: Check Formatting
        run: pixi run format-cpp-check

  test-isaaclab-export:
    name: Test Export IsaacLab and Controller Example
    runs-on: github-gpu-runner
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: latest
          frozen: true
          cache: false

      - name: Run Isaac Lab Export Test
        run: pixi run export-isaaclab-ci

      - name: Build Exploy Library
        run: pixi run build-cpp

      - name: Run Controller Loopback Example
        run: pixi run run-cpp-example

  test-frameworks-isaaclab:
    name: Test Frameworks - IsaacLab
    runs-on: github-gpu-runner
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: latest
          frozen: true
          cache: false

      - name: Run Frameworks IsaacLab Tests
        run: pixi run test-python-isaaclab --capture=no
