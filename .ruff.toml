# Ruff configuration
line-length = 100
src = ["python/"]
target-version = "py311"

[lint]
# Enable pycodestyle (E), pyflakes (F), isort (I), and other useful rules
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]

ignore = [
    "E501", # line-too-long (formatter handles code lines; comments/docstrings must be manual)
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

# Exclude patterns
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".pixi",
    "IsaacLab",
    "*.egg-info",
    "python/**/_version.py",
]
